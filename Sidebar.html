<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Suite</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4ef;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --success: #15803d;
      --danger: #b91c1c;
      --warning: #b45309;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 16px;
      color: #ffffff;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    header p {
      margin: 4px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 12px;
    }

    main {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
    }

    .card-header h2 {
      margin: 0;
      color: #334155;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-body { padding: 14px; }

    .stack { display: grid; gap: 12px; }
    .row { display: flex; align-items: center; gap: 10px; }
    .between { justify-content: space-between; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    label {
      display: block;
      margin-bottom: 5px;
      color: #334155;
      font-weight: 700;
      font-size: 12px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.14);
    }

    .radio-row,
    .check-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .radio-row label,
    .check-row label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      font-weight: 600;
      cursor: pointer;
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 13px;
    }

    .muted { color: var(--muted); font-size: 12px; }
    .hidden { display: none !important; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
    }

    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: 0.6; }

    .btn-primary { background: var(--primary); color: #ffffff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-secondary { background: #e2e8f0; color: #1e293b; }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 999px; }
    .btn-full { width: 100%; }

    .status {
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 13px;
    }

    .status.info { color: #1d4ed8; background: #dbeafe; border: 1px solid #bfdbfe; }
    .status.success { color: var(--success); background: #dcfce7; border: 1px solid #bbf7d0; }
    .status.error { color: var(--danger); background: #fee2e2; border: 1px solid #fecaca; }
    .status.warning { color: var(--warning); background: #fef3c7; border: 1px solid #fde68a; }

    .pill-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
      font-size: 11px;
    }

    .progress-wrap { display: grid; gap: 7px; }
    .progress-meta { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; }
    .progress-track { height: 9px; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
    .progress-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.25s ease; }

    .list { display: grid; gap: 8px; max-height: 260px; overflow: auto; }
    .item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
    }

    .item strong { display: block; margin-bottom: 3px; }
    .item a { color: var(--primary); font-weight: 700; word-break: break-word; }

    .footer-actions {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>Generator Suite</h1>
    <p>Docs, Slides, Sheets, PDF, email, QR, and batch generation.</p>
  </header>

  <main>
    <section class="card">
      <div class="card-header">
        <h2>Current selection</h2>
        <button id="refresh-btn" class="btn-secondary btn-icon" type="button" title="Refresh selection">↻</button>
      </div>
      <div class="card-body stack">
        <div id="selection-status" class="status info">Checking selection...</div>
        <div id="selection-details" class="muted"></div>
        <div id="mime-pills" class="pill-list"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Configuration</h2>
      </div>
      <div class="card-body stack">
        <div id="doc-slide-options" class="section hidden">
          <h3>Doc / Slide output</h3>
          <div class="stack">
            <div>
              <label>Output mode</label>
              <div class="radio-row">
                <label><input type="radio" name="docSlideOutputMode" value="separate" checked> Separate files</label>
                <label><input type="radio" name="docSlideOutputMode" value="combined"> Combined file</label>
              </div>
            </div>
            <div id="combined-doc-slide-name-container" class="hidden">
              <label for="combinedDocSlideName">Combined file name</label>
              <input id="combinedDocSlideName" type="text" placeholder="e.g., Master Report">
            </div>
            <div id="doc-slide-format-container">
              <label for="format">Format</label>
              <select id="format">
                <option value="DOC">Keep original format</option>
                <option value="PDF">Convert to PDF</option>
              </select>
            </div>
          </div>
        </div>

        <div id="sheet-options" class="section hidden">
          <h3>Sheet output</h3>
          <div class="stack">
            <div>
              <label>Output mode</label>
              <div class="radio-row">
                <label><input type="radio" name="sheetOutputMode" value="separate" checked> Separate files</label>
                <label><input type="radio" name="sheetOutputMode" value="combined"> Combined spreadsheet</label>
              </div>
            </div>
            <div id="combined-sheet-name-container" class="hidden">
              <label for="combinedSheetName">Combined spreadsheet name</label>
              <input id="combinedSheetName" type="text" placeholder="e.g., Class Certificates">
            </div>
            <div>
              <label for="sheetTarget">Target template tab</label>
              <input id="sheetTarget" type="text" placeholder="Optional. Blank = all tabs">
            </div>
            <div id="new-sheet-name-container">
              <label for="newSheetName">Rename output tab</label>
              <input id="newSheetName" type="text" placeholder="Optional">
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label for="batchSize">Batch size</label>
            <input id="batchSize" type="number" value="5" min="1" max="50">
            <div class="muted">Lower is safer for large templates.</div>
          </div>
          <div>
            <label>Email</label>
            <div class="check-row" style="padding-top: 9px;">
              <label><input id="sendEmail" type="checkbox"> Send email when recipient exists</label>
            </div>
          </div>
        </div>

        <div class="footer-actions">
          <button id="run" class="btn-primary btn-full" type="button">Generate</button>
          <button id="cancel" class="btn-danger" type="button">Cancel</button>
          <button id="clear" class="btn-secondary" type="button">Clear</button>
        </div>

        <div id="message-area" class="status info hidden"></div>

        <div id="progress-card" class="progress-wrap hidden">
          <div class="progress-meta">
            <span id="progress-text">0%</span>
            <span id="progress-count">0/0</span>
          </div>
          <div class="progress-track"><div id="bar" class="progress-bar"></div></div>
        </div>
      </div>
    </section>

    <section id="results-card" class="card hidden">
      <div class="card-header">
        <h2>Activity log</h2>
      </div>
      <div class="card-body">
        <div id="log" class="list"></div>
      </div>
    </section>

    <section id="folder-card" class="card hidden">
      <div class="card-header">
        <h2>Target folders</h2>
      </div>
      <div class="card-body">
        <div id="folder-log" class="list"></div>
      </div>
    </section>
  </main>

  <script>
    const APP_MIME = {
      DOCS: 'application/vnd.google-apps.document',
      SLIDES: 'application/vnd.google-apps.presentation',
      SHEETS: 'application/vnd.google-apps.spreadsheet',
    };

    const $ = (selector) => document.querySelector(selector);

    const selectionStatus = $('#selection-status');
    const selectionDetails = $('#selection-details');
    const mimePills = $('#mime-pills');
    const docSlideOptions = $('#doc-slide-options');
    const sheetOptions = $('#sheet-options');
    const combinedDocSlideNameContainer = $('#combined-doc-slide-name-container');
    const combinedSheetNameContainer = $('#combined-sheet-name-container');
    const newSheetNameContainer = $('#new-sheet-name-container');
    const messageArea = $('#message-area');
    const progressCard = $('#progress-card');
    const progressText = $('#progress-text');
    const progressCount = $('#progress-count');
    const progressBar = $('#bar');
    const logEl = $('#log');
    const folderEl = $('#folder-log');
    const resultsCard = $('#results-card');
    const folderCard = $('#folder-card');
    const runButton = $('#run');
    const cancelButton = $('#cancel');
    const clearButton = $('#clear');
    const refreshButton = $('#refresh-btn');

    let currentSelection = null;
    let poller = null;

    refreshButton.addEventListener('click', refreshSelection);
    runButton.addEventListener('click', startGeneration);
    cancelButton.addEventListener('click', cancelGeneration);
    clearButton.addEventListener('click', clearOutput);

    document.querySelectorAll('input[name="docSlideOutputMode"]').forEach((input) => {
      input.addEventListener('change', updateModeVisibility);
    });

    document.querySelectorAll('input[name="sheetOutputMode"]').forEach((input) => {
      input.addEventListener('change', updateModeVisibility);
    });

    refreshSelection();
    pollExistingStatus();

    function refreshSelection() {
      setSelectionMessage('Checking selection...', 'info');
      google.script.run
        .withSuccessHandler((details) => {
          currentSelection = details || {};
          renderSelection(currentSelection);
        })
        .withFailureHandler((error) => setSelectionMessage(errorMessage(error), 'error'))
        .getSelectionDetails();
    }

    function renderSelection(details) {
      const selected = details.selectedIndices || [];
      const mimeTypes = details.mimeTypes || [];
      const invalid = details.invalidItems || [];

      if (!selected.length) {
        setSelectionMessage(details.message || 'Select rows in R-DOC-GEN or columns in C-DOC-GEN.', 'warning');
      } else if (invalid.length) {
        setSelectionMessage(`Selected ${selected.length} item(s), but ${invalid.length} has missing or invalid template IDs.`, 'warning');
      } else {
        setSelectionMessage(`Ready: ${selected.length} selected item(s).`, 'success');
      }

      selectionDetails.textContent = details.sheetName
        ? `Sheet: ${details.sheetName} • Items: ${selected.join(', ') || 'none'}`
        : 'No active sheet detected.';

      mimePills.innerHTML = mimeTypes.length
        ? mimeTypes.map((mime) => `<span class="pill">${escapeHtml(labelForMime(mime))}</span>`).join('')
        : '<span class="pill">No supported template detected</span>';

      const hasDocsOrSlides = mimeTypes.includes(APP_MIME.DOCS) || mimeTypes.includes(APP_MIME.SLIDES);
      const hasSheets = mimeTypes.includes(APP_MIME.SHEETS);
      docSlideOptions.classList.toggle('hidden', !hasDocsOrSlides);
      sheetOptions.classList.toggle('hidden', !hasSheets);
      updateModeVisibility();
    }

    function updateModeVisibility() {
      const docMode = getRadioValue('docSlideOutputMode');
      const sheetMode = getRadioValue('sheetOutputMode');
      combinedDocSlideNameContainer.classList.toggle('hidden', docMode !== 'combined');
      combinedSheetNameContainer.classList.toggle('hidden', sheetMode !== 'combined');
      newSheetNameContainer.classList.toggle('hidden', sheetMode === 'combined');
    }

    function startGeneration() {
      if (!currentSelection || !currentSelection.selectedIndices || !currentSelection.selectedIndices.length) {
        showMessage('Select valid rows or columns first.', 'warning');
        return;
      }

      const options = buildOptions();
      clearOutput();
      setBusy(true);
      showMessage('Starting generation...', 'info');
      progressCard.classList.remove('hidden');

      google.script.run
        .withSuccessHandler(() => {
          showMessage('Generation started. Progress will update automatically.', 'info');
          startPolling();
        })
        .withFailureHandler((error) => {
          setBusy(false);
          showMessage(errorMessage(error), 'error');
        })
        .runGenerator(options, currentSelection.sheetName);
    }

    function buildOptions() {
      return {
        format: $('#format').value,
        sendEmail: $('#sendEmail').checked,
        batchSize: Number($('#batchSize').value || 5),
        sheetTarget: $('#sheetTarget').value.trim(),
        newSheetName: $('#newSheetName').value.trim(),
        sheetOutputMode: getRadioValue('sheetOutputMode'),
        docSlideOutputMode: getRadioValue('docSlideOutputMode'),
        combinedSheetName: $('#combinedSheetName').value.trim(),
        combinedDocSlideName: $('#combinedDocSlideName').value.trim(),
      };
    }

    function startPolling() {
      stopPolling();
      pollStatus();
      poller = setInterval(pollStatus, 2000);
    }

    function pollExistingStatus() {
      google.script.run
        .withSuccessHandler((state) => {
          if (state && state.status === 'running') startPolling();
          else if (state && state.status && state.status !== 'idle') renderState(state);
        })
        .getGenerationStatus();
    }

    function pollStatus() {
      google.script.run
        .withSuccessHandler((state) => {
          renderState(state || { status: 'idle' });
          if (!state || ['complete', 'error', 'cancelled', 'idle'].includes(state.status)) {
            stopPolling();
            setBusy(false);
            refreshSelection();
          }
        })
        .withFailureHandler((error) => {
          stopPolling();
          setBusy(false);
          showMessage(errorMessage(error), 'error');
        })
        .getGenerationStatus();
    }

    function renderState(state) {
      const total = state.totalItems || 0;
      const current = state.currentIndex || 0;
      const percent = total ? Math.round((current / total) * 100) : 0;

      progressCard.classList.toggle('hidden', state.status === 'idle');
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `${percent}%`;
      progressCount.textContent = `${current}/${total} item(s)`;

      if (state.status === 'running') showMessage(`Running batch generation... ${current}/${total} processed.`, 'info');
      else if (state.status === 'complete') showMessage('Generation complete.', 'success');
      else if (state.status === 'error') showMessage(state.error || 'Generation failed.', 'error');
      else if (state.status === 'cancelled') showMessage('Generation cancelled.', 'warning');

      renderResults(state.results || []);
      renderFolders(state.folders || []);
    }

    function renderResults(results) {
      resultsCard.classList.toggle('hidden', !results.length);
      logEl.innerHTML = results.map((result) => `
        <div class="item">
          <strong>${escapeHtml(result.item || 'Item')}</strong>
          <div class="muted">${escapeHtml(result.status || '')}</div>
          ${result.url ? `<a href="${escapeAttribute(result.url)}" target="_blank" rel="noopener">Open output</a>` : ''}
        </div>
      `).join('');
    }

    function renderFolders(folders) {
      folderCard.classList.toggle('hidden', !folders.length);
      folderEl.innerHTML = folders.map((folder, index) => `
        <div class="item">
          <strong>Folder ${index + 1}</strong>
          <a href="${escapeAttribute(folder.url)}" target="_blank" rel="noopener">Open folder</a>
        </div>
      `).join('');
    }

    function cancelGeneration() {
      setBusy(true);
      google.script.run
        .withSuccessHandler((state) => {
          stopPolling();
          setBusy(false);
          renderState(state || { status: 'cancelled' });
        })
        .withFailureHandler((error) => {
          setBusy(false);
          showMessage(errorMessage(error), 'error');
        })
        .cancelGeneration();
    }

    function clearOutput() {
      logEl.innerHTML = '';
      folderEl.innerHTML = '';
      resultsCard.classList.add('hidden');
      folderCard.classList.add('hidden');
      progressCard.classList.add('hidden');
      progressBar.style.width = '0%';
      progressText.textContent = '0%';
      progressCount.textContent = '0/0';
      messageArea.classList.add('hidden');
    }

    function setBusy(isBusy) {
      runButton.disabled = isBusy;
      refreshButton.disabled = isBusy;
      runButton.textContent = isBusy ? 'Working...' : 'Generate';
    }

    function setSelectionMessage(text, type) {
      selectionStatus.className = `status ${type}`;
      selectionStatus.textContent = text;
    }

    function showMessage(text, type) {
      messageArea.className = `status ${type}`;
      messageArea.textContent = text;
    }

    function stopPolling() {
      if (poller) clearInterval(poller);
      poller = null;
    }

    function getRadioValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : 'separate';
    }

    function labelForMime(mime) {
      if (mime === APP_MIME.DOCS) return 'Google Doc';
      if (mime === APP_MIME.SLIDES) return 'Google Slides';
      if (mime === APP_MIME.SHEETS) return 'Google Sheet';
      return mime;
    }

    function errorMessage(error) {
      return error && error.message ? error.message : String(error || 'Unknown error');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttribute(value) {
      return escapeHtml(value || '#');
    }
  </script>
</body>
</html>
